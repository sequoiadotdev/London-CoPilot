<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Input Experiment</title>
  <style>
    :root {
      --pill-radius: 9999px;
      --border: 3px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #000;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .form-control {
      width: min(360px, 90vw);
    }

    .input-box {
      position: relative;
      border-radius: var(--pill-radius);
      padding: var(--border);
      overflow: hidden;
      background: rgba(255, 255, 255, 0.1);
      transition: background 0.35s ease;
    }

    .form-control:focus-within .input-box {
      background: transparent;
    }

    .traveler-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 220%;
      aspect-ratio: 1;
      transform: translate(-50%, -50%) rotate(0deg);
      background: conic-gradient(
        from 0deg,
        transparent 0deg 285deg,
        rgba(255, 255, 255, 0.08) 295deg,
        rgba(255, 255, 255, 0.25) 308deg,
        rgba(255, 255, 255, 0.55) 320deg,
        rgba(255, 255, 255, 0.85) 330deg,
        #ffffff 336deg,
        #ffffff 342deg,
        transparent 350deg,
        transparent 360deg
      );
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
      animation: orbit 8.5s linear infinite;
      filter:
        drop-shadow(0 0 4px rgba(255, 255, 255, 0.9))
        drop-shadow(0 0 12px rgba(255, 255, 255, 0.45))
        drop-shadow(0 0 22px rgba(255, 255, 255, 0.2));
    }

    .form-control:focus-within .traveler-ring {
      opacity: 1;
    }

    .input {
      position: relative;
      z-index: 1;
      display: block;
      color: #fff;
      font-size: 1.2rem;
      background: #000;
      width: 100%;
      padding: 0.9em 1.4em;
      border: none;
      border-radius: var(--pill-radius);
    }

    .input::placeholder {
      color: rgba(255, 255, 255, 0.35);
    }

    .input:focus {
      outline: none;
    }

    @keyframes orbit {
      to {
        transform: translate(-50%, -50%) rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <div class="form-control">
    <div class="input-box">
      <div class="traveler-ring" aria-hidden="true"></div>
      <input class="input" placeholder="Type something intelligent" required type="text">
    </div>
  </div>
</body>
</html>
